name: EC2 Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Run EC2 Runtime Diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Check STS Caller Identity
        run: |
          echo "=== AWS Caller Identity ==="
          aws sts get-caller-identity --output json

      - name: Describe All EC2 Instances
        run: |
          echo "=== All EC2 Instances in ap-south-1 ==="
          aws ec2 describe-instances --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,PublicIpAddress:PublicIpAddress,SecurityGroups:SecurityGroups,Tags:Tags}" --output json || true

      - name: Describe All Security Groups
        run: |
          echo "=== All Security Groups in ap-south-1 ==="
          aws ec2 describe-security-groups --query "SecurityGroups[*].{GroupName:GroupName,GroupId:GroupId,IpPermissions:IpPermissions}" --output json || true

      - name: Network Connectivity Test to EIP
        run: |
          echo "=== Ping / NC check to 35.154.59.136 ==="
          ping -c 3 35.154.59.136 || true
          nc -zv -w 5 35.154.59.136 22 || true
          nc -zv -w 5 35.154.59.136 80 || true
          nc -zv -w 5 35.154.59.136 8000 || true
