services:
  db:
    image: mysql:8.0
    container_name: infrasight-db-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: infrasight
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: yuvarajofl/infrasight-backend:latest
    container_name: infrasight-backend-prod
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      - ./uploads:/app/uploads
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_PORT=3306
      - DB_NAME=infrasight
      - APP_ENV=production
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: yuvarajofl/infrasight-frontend:latest
    container_name: infrasight-frontend-prod
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data_prod:
